# application.yml은 Spring Boot의 외부 설정 파일이다.
# 코드에 하드코딩하지 않고 설정을 분리하면 환경별 변경이 쉬워진다.

server:
  port: 8080

spring:
  datasource:
    # H2 인메모리 DB.
    # 애플리케이션이 뜰 때 메모리 위에 데이터베이스가 생성되고,
    # 프로세스가 종료되면 사라진다.
    url: jdbc:h2:mem:studydb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      # 학습용이므로 실행할 때마다 테이블을 새로 만든다.
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # 타임존 관련 학습 시 혼동을 줄이기 위해 UTC로 고정할 수도 있으나,
        # 이번 예제는 시스템 Clock을 Bean으로 주입받아 사용한다.
        jdbc:
          time_zone: UTC

logging:
  level:
    org.hibernate.SQL: debug
